<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 256 256"
  role="img"
  aria-label="M7 favicon"
>
  <defs>
    <style>
      :root {
        --bg-1: oklch(26.3% 0.024 320.12);
        --bg-2: oklch(21.2% 0.019 322.12);
        --accent: oklch(71.1% 0.019 323.02);
        --text-1: oklch(92.9% 0.013 255.508);
        --text-2: oklch(92.4% 0.12 95.746);
      }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color: var(--bg-1)" />
      <stop offset="100%" style="stop-color: var(--bg-2)" />
    </linearGradient>

    <linearGradient id="text" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color: var(--text-1)" />
      <stop offset="62%" style="stop-color: var(--text-2)" />
      <stop offset="100%" style="stop-color: var(--accent)" />
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow
        dx="0"
        dy="10"
        stdDeviation="10"
        flood-color="#000000"
        flood-opacity="0.45"
      />
    </filter>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

	  <rect x="10" y="10" width="236" height="236" rx="54" fill="url(#bg)" />

  <rect
    x="10.5"
    y="10.5"
    width="235"
    height="235"
    rx="53.5"
    fill="none" 
    stroke="var(--accent)"
    stroke-width="2"
  />

  <ellipse
    cx="178"
    cy="74"
    rx="64"
    ry="36"
    fill="var(--accent)"
    opacity="0.10"
    filter="url(#glow)"
  />

  <rect
    x="22"
    y="22"
    width="212"
    height="88"
    rx="42"
    fill="url(#shine)"
  />

  <text
    x="128"
    y="136"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#text)"
    filter="url(#shadow)"
    style="
      font-family: Inter, 'Segoe UI', Arial, sans-serif;
      font-size: 126px;
      font-weight: 800;
      letter-spacing: -8px;
    "
  >
    M7
  </text>
</svg>